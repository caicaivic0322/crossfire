<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS射击游戏 - 炙热沙城2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');

        :root {
            --hud-bg: rgba(7, 17, 24, 0.78);
            --hud-border: rgba(143, 190, 210, 0.28);
            --hud-text: #edf7f7;
            --hud-muted: rgba(222, 239, 241, 0.72);
            --hud-accent: #f7b24d;
            --hud-accent-strong: #ff7a3d;
            --ally: #59c6ff;
            --player: #8eff9a;
            --enemy: #ff6a5c;
            --shadow-glow: 0 24px 60px rgba(0, 0, 0, 0.36);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            overflow: hidden;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background:
                radial-gradient(circle at 20% 20%, rgba(255, 201, 112, 0.18), transparent 28%),
                radial-gradient(circle at 80% 10%, rgba(101, 149, 201, 0.2), transparent 34%),
                linear-gradient(180deg, #06111a 0%, #0a1520 100%);
            color: var(--hud-text);
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
        }

        body::before {
            z-index: 40;
            background:
                radial-gradient(circle at center, transparent 42%, rgba(2, 9, 15, 0.38) 100%),
                linear-gradient(180deg, rgba(255, 196, 104, 0.08), transparent 30%, rgba(18, 38, 51, 0.3) 100%);
        }

        body::after {
            z-index: 45;
            opacity: 0.18;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 3px 3px, 3px 3px;
            mix-blend-mode: overlay;
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1200;
            width: 28px;
            height: 28px;
            filter: drop-shadow(0 0 10px rgba(136, 255, 173, 0.55));
        }

        #crosshair::before,
        #crosshair::after,
        #crosshair span {
            content: '';
            position: absolute;
            background: linear-gradient(90deg, rgba(188, 255, 209, 0.2), rgba(132, 255, 174, 0.95), rgba(188, 255, 209, 0.2));
            border-radius: 999px;
        }

        #crosshair::before {
            width: 28px;
            height: 2px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #crosshair::after {
            width: 2px;
            height: 28px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #crosshair span {
            width: 6px;
            height: 6px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(220, 255, 230, 0.95);
            box-shadow: 0 0 14px rgba(136, 255, 173, 0.75);
        }

        .hud-hidden {
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }

        .panel {
            position: fixed;
            z-index: 1100;
            border: 1px solid var(--hud-border);
            background:
                linear-gradient(180deg, rgba(18, 35, 45, 0.88), rgba(6, 15, 22, 0.78)),
                rgba(7, 17, 24, 0.82);
            backdrop-filter: blur(18px);
            box-shadow: var(--shadow-glow);
            overflow: hidden;
        }

        .panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 183, 94, 0.18), transparent 40%, rgba(84, 205, 255, 0.12) 100%);
            pointer-events: none;
        }

        .panel-label {
            position: relative;
            font-family: 'Rajdhani', 'Noto Sans SC', sans-serif;
            font-size: 12px;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: rgba(229, 241, 243, 0.6);
            margin-bottom: 10px;
        }

        .panel-title {
            position: relative;
            font-family: 'Rajdhani', 'Noto Sans SC', sans-serif;
            font-size: 34px;
            letter-spacing: 0.04em;
            line-height: 1;
            margin-bottom: 14px;
        }

        .panel-row {
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
            font-size: 14px;
        }

        .panel-key {
            color: var(--hud-muted);
        }

        .panel-value {
            font-family: 'Rajdhani', 'Noto Sans SC', sans-serif;
            font-size: 20px;
            letter-spacing: 0.03em;
        }

        #hud {
            left: 20px;
            bottom: 20px;
            width: min(340px, calc(100vw - 40px));
            padding: 18px 18px 20px;
            border-radius: 22px;
        }

        #gameInfo {
            left: 20px;
            top: 20px;
            width: min(320px, calc(100vw - 40px));
            padding: 18px;
            border-radius: 20px;
        }

        #minimapPanel {
            top: 20px;
            right: 20px;
            width: 236px;
            padding: 16px 16px 14px;
            border-radius: 24px;
        }

        #ammoInfo {
            color: var(--hud-accent);
        }

        .meter {
            position: relative;
            margin-top: 14px;
            height: 10px;
            border-radius: 999px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .meter-fill {
            position: absolute;
            inset: 0 auto 0 0;
            width: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #72f6a8, #f3c45b 72%, #ff6a5c 100%);
            box-shadow: 0 0 18px rgba(114, 246, 168, 0.42);
            transition: width 120ms ease-out;
        }

        .combat-chip {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            font-size: 13px;
            color: #d9f5e3;
            background: rgba(70, 174, 112, 0.16);
        }

        .combat-chip::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 12px currentColor;
        }

        .combat-chip[data-state="ready"] {
            color: #d9f5e3;
            background: rgba(61, 149, 100, 0.18);
        }

        .combat-chip[data-state="engaged"] {
            color: #ffd59f;
            background: rgba(243, 149, 55, 0.18);
        }

        .combat-chip[data-state="danger"] {
            color: #ffd2cd;
            background: rgba(255, 92, 81, 0.22);
        }

        #minimapCanvas {
            position: relative;
            display: block;
            width: 100%;
            aspect-ratio: 1;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: linear-gradient(180deg, rgba(5, 14, 22, 0.92), rgba(14, 28, 36, 0.82));
        }

        .minimap-legend {
            position: relative;
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-top: 12px;
            font-size: 12px;
            color: var(--hud-muted);
        }

        .legend {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .legend::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 10px currentColor;
        }

        .legend.ally { color: var(--ally); }
        .legend.you { color: var(--player); }
        .legend.enemy { color: var(--enemy); }

        #menu {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at top, rgba(255, 188, 102, 0.16), transparent 26%),
                linear-gradient(135deg, rgba(48, 25, 10, 0.94), rgba(16, 24, 31, 0.96) 58%, rgba(9, 18, 26, 0.98));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            color: white;
            padding: 32px 20px;
        }

        #menu h1 {
            font-family: 'Rajdhani', 'Noto Sans SC', sans-serif;
            font-size: clamp(54px, 8vw, 88px);
            letter-spacing: 0.08em;
            margin-bottom: 10px;
            color: #ffd18a;
            text-shadow: 0 10px 26px rgba(0, 0, 0, 0.42);
        }

        #menu h2 {
            font-family: 'Rajdhani', 'Noto Sans SC', sans-serif;
            font-size: clamp(20px, 3vw, 28px);
            letter-spacing: 0.12em;
            margin-bottom: 34px;
            color: rgba(235, 246, 250, 0.84);
        }

        .menu-section {
            width: min(640px, 100%);
            margin-bottom: 18px;
            text-align: center;
            padding: 18px 20px;
            border-radius: 20px;
            background: rgba(7, 16, 24, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .menu-section h3 {
            font-family: 'Rajdhani', 'Noto Sans SC', sans-serif;
            font-size: 20px;
            letter-spacing: 0.08em;
            margin-bottom: 12px;
            color: #ecf7f8;
        }

        .menu-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .menu-btn {
            padding: 12px 24px;
            font-family: 'Rajdhani', 'Noto Sans SC', sans-serif;
            font-size: 18px;
            letter-spacing: 0.03em;
            cursor: pointer;
            background: rgba(11, 24, 34, 0.78);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            transition: transform 180ms ease, background 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
            box-shadow: 0 14px 28px rgba(0, 0, 0, 0.18);
        }

        .menu-btn:hover {
            background: rgba(255, 132, 67, 0.18);
            border-color: rgba(255, 183, 94, 0.55);
            transform: translateY(-2px);
        }

        .menu-btn.selected {
            background: linear-gradient(135deg, rgba(255, 138, 74, 0.95), rgba(245, 180, 76, 0.88));
            color: #111;
            border-color: transparent;
        }

        #startBtn {
            margin-top: 28px;
            padding: 18px 64px;
            font-family: 'Rajdhani', 'Noto Sans SC', sans-serif;
            font-size: 28px;
            letter-spacing: 0.08em;
            background: linear-gradient(135deg, #ff8747, #f6c15e);
            border: none;
            border-radius: 999px;
            cursor: pointer;
            color: #111;
            font-weight: 700;
            box-shadow: 0 20px 50px rgba(255, 137, 71, 0.28);
            transition: transform 180ms ease, box-shadow 180ms ease;
        }

        #startBtn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 28px 58px rgba(255, 137, 71, 0.36);
        }

        #gameOver {
            position: fixed;
            inset: 0;
            background: rgba(2, 8, 14, 0.86);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            color: white;
            backdrop-filter: blur(16px);
        }

        #gameOver h1 {
            font-family: 'Rajdhani', 'Noto Sans SC', sans-serif;
            font-size: clamp(58px, 9vw, 92px);
            margin-bottom: 20px;
            letter-spacing: 0.08em;
        }

        #gameOver.victory h1 { color: #72f6c5; }
        #gameOver.defeat h1 { color: #ff8076; }

        #restartBtn {
            margin-top: 24px;
            padding: 14px 42px;
            font-family: 'Rajdhani', 'Noto Sans SC', sans-serif;
            font-size: 22px;
            background: linear-gradient(135deg, #69d5d2, #e7ff9b);
            border: none;
            border-radius: 999px;
            cursor: pointer;
            color: #031015;
            font-weight: 700;
        }

        .controls-info {
            margin-top: 20px;
            color: rgba(235, 246, 250, 0.9);
            font-size: 14px;
            text-align: center;
            background: rgba(7, 16, 24, 0.46);
            padding: 16px 20px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 4000;
            display: none;
            padding: 14px 20px;
            border-radius: 999px;
            font-family: 'Rajdhani', 'Noto Sans SC', sans-serif;
            font-size: 24px;
            letter-spacing: 0.08em;
            color: #f6f7f7;
            background: rgba(8, 19, 28, 0.86);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        @media (max-width: 900px) {
            #hud,
            #gameInfo,
            #minimapPanel {
                width: calc(100vw - 28px);
                left: 14px;
                right: 14px;
            }

            #gameInfo {
                top: 14px;
            }

            #minimapPanel {
                top: auto;
                bottom: 178px;
            }

            #hud {
                bottom: 14px;
            }

            .panel-title {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="crosshair"><span></span></div>
    <div id="loading">加载中...</div>
    
    <div id="hud" class="panel">
        <div class="panel-label">Tactical Status</div>
        <div id="weaponInfo" class="panel-title">手枪</div>
        <div class="panel-row">
            <span class="panel-key">弹药</span>
            <span id="ammoInfo" class="panel-value">12 / 60</span>
        </div>
        <div class="panel-row">
            <span class="panel-key">生命</span>
            <span id="healthInfo" class="panel-value">100</span>
        </div>
        <div class="meter">
            <div id="healthBarFill" class="meter-fill"></div>
        </div>
        <div id="statusInfo" class="combat-chip" data-state="ready">待命</div>
    </div>
    
    <div id="gameInfo" class="panel">
        <div class="panel-label">Battlefield Feed</div>
        <div class="panel-row">
            <span class="panel-key">战况</span>
            <span id="teamInfo" class="panel-value">友军 3 / 敌军 3</span>
        </div>
        <div class="panel-row">
            <span class="panel-key">目标</span>
            <span id="objectiveInfo" class="panel-value">清除全部敌军</span>
        </div>
        <div class="panel-row">
            <span class="panel-key">控制</span>
            <span id="pointerInfo" class="panel-value">左键进入战斗</span>
        </div>
        <div class="panel-row">
            <span class="panel-key">音效</span>
            <span id="audioInfo" class="panel-value">等待激活</span>
        </div>
    </div>
    
    <div id="minimapPanel" class="panel">
        <div class="panel-label">Tactical Map</div>
        <canvas id="minimapCanvas" width="180" height="180"></canvas>
        <div class="minimap-legend">
            <span class="legend ally">友军</span>
            <span class="legend you">你</span>
            <span class="legend enemy">敌军</span>
        </div>
    </div>
    
    <div id="menu">
        <h1>CS射击游戏</h1>
        <h2>炙热沙城2 (Dust 2)</h2>
        
        <div class="menu-section">
            <h3>选择武器</h3>
            <div class="menu-buttons" id="weaponButtons">
                <button class="menu-btn selected" data-weapon="pistol">手枪</button>
                <button class="menu-btn" data-weapon="rifle">步枪</button>
                <button class="menu-btn" data-weapon="shotgun">霰弹枪</button>
                <button class="menu-btn" data-weapon="sniper">狙击枪</button>
            </div>
        </div>
        
        <div class="menu-section">
            <h3>队友数量 (1-5)</h3>
            <div class="menu-buttons" id="teammateButtons">
                <button class="menu-btn" data-teammates="1">1</button>
                <button class="menu-btn" data-teammates="2">2</button>
                <button class="menu-btn selected" data-teammates="3">3</button>
                <button class="menu-btn" data-teammates="4">4</button>
                <button class="menu-btn" data-teammates="5">5</button>
            </div>
        </div>
        
        <div class="menu-section">
            <h3>敌人数量 (1-5)</h3>
            <div class="menu-buttons" id="enemyButtons">
                <button class="menu-btn" data-enemies="1">1</button>
                <button class="menu-btn" data-enemies="2">2</button>
                <button class="menu-btn selected" data-enemies="3">3</button>
                <button class="menu-btn" data-enemies="4">4</button>
                <button class="menu-btn" data-enemies="5">5</button>
            </div>
        </div>
        
        <button id="startBtn">开始游戏</button>
        
        <div class="controls-info">
            <p><strong>操作说明：</strong> WASD-移动 | 鼠标-瞄准 | 左键-射击 | 空格-跳跃 | R-换弹 | Q-HUD</p>
        </div>
    </div>
    
    <div id="gameOver">
        <h1 id="gameOverText">游戏胜利!</h1>
        <p id="gameOverStats">剩余队友: 3 | 击杀敌人: 3</p>
        <button id="restartBtn">重新开始</button>
    </div>

    <script src="hud-utils.js"></script>
    <script src="audio-utils.js"></script>
    <script src="radar-utils.js"></script>
    <script>
        console.log('=== 脚本开始执行 ===');
        
        // 全局变量
        var scene = null;
        var camera = null;
        var renderer = null;
        var player = null;
        var teammates = [];
        var enemies = [];
        var bullets = [];
        var isGameRunning = false;
        var selectedWeapon = 'pistol';
        var teammateCount = 3;
        var enemyCount = 3;
        var playerHealth = 100;
        var isPointerLocked = false;
        var keysPressed = {};
        var currentWeapon = {
            name: '手枪',
            damage: 25,
            fireRate: 300,
            ammo: 12,
            maxAmmo: 12,
            reserveAmmo: 60,
            spread: 0.02
        };

        var weapons = {
            pistol: { name: '手枪', damage: 25, fireRate: 300, ammo: 12, maxAmmo: 12, reserveAmmo: 60, spread: 0.02 },
            rifle: { name: '步枪', damage: 30, fireRate: 100, ammo: 30, maxAmmo: 30, reserveAmmo: 120, spread: 0.03 },
            shotgun: { name: '霰弹枪', damage: 15, fireRate: 800, ammo: 8, maxAmmo: 8, reserveAmmo: 32, spread: 0.15, pellets: 8 },
            sniper: { name: '狙击枪', damage: 100, fireRate: 1500, ammo: 5, maxAmmo: 5, reserveAmmo: 20, spread: 0.005 }
        };

        var weaponModel = null;
        var weaponRecoil = 0;
        var weaponSway = { x: 0, y: 0 };
        var weaponBob = 0;
        var reloadStartTime = 0;
        var reloadDuration = 2000;
        var muzzleFlash = null;
        var muzzleFlashTime = 0;
        var audioContext = null;
        var audioMasterGain = null;
        var audioNoiseBuffer = null;
        var lastFootstepTime = 0;
        var footstepIndex = 0;
        var lastPlayerDamageSoundTime = 0;
        var lastHitConfirmTime = 0;
        var isHudVisible = true;
        var hudTargetIds = ['crosshair', 'hud', 'gameInfo', 'minimapPanel'];
        var minimapCanvas = null;
        var minimapContext = null;
        var radarConfig = {
            size: 180,
            padding: 18,
            range: 220,
            worldMin: -170,
            worldMax: 170,
            anchors: [
                { label: 'T', x: -150, z: -180 },
                { label: 'A', x: -100, z: -50 },
                { label: 'B', x: 120, z: 100 },
                { label: 'CT', x: 0, z: 180 }
            ]
        };

        // DOM加载完成后立即设置菜单按钮
        document.addEventListener('DOMContentLoaded', function() {
            console.log('=== DOM加载完成 ===');
            setupTacticalPanels();
            setupMenuButtons();
        });

        function setupTacticalPanels() {
            minimapCanvas = document.getElementById('minimapCanvas');
            if (minimapCanvas) {
                minimapContext = minimapCanvas.getContext('2d');
                updateMinimap();
            }
            setHudVisibility(true);
            updatePointerStatusText();
            updateAudioStatusText();
        }

        function setHudVisibility(isVisible) {
            isHudVisible = isVisible;

            for (var i = 0; i < hudTargetIds.length; i++) {
                var element = document.getElementById(hudTargetIds[i]);
                if (!element) continue;

                if (isVisible) {
                    element.classList.remove('hud-hidden');
                } else {
                    element.classList.add('hud-hidden');
                }
            }
        }

        function toggleHudVisibility() {
            var nextState = window.CrossfireHud
                ? window.CrossfireHud.toggleHudVisibilityState(isHudVisible)
                : !isHudVisible;
            setHudVisibility(nextState);
        }

        function getAliveCounts() {
            var aliveTeammates = 0;
            for (var i = 0; i < teammates.length; i++) {
                if (teammates[i].isAlive) aliveTeammates++;
            }

            var aliveEnemies = 0;
            for (var j = 0; j < enemies.length; j++) {
                if (enemies[j].isAlive) aliveEnemies++;
            }

            return {
                aliveTeammates: aliveTeammates,
                aliveEnemies: aliveEnemies
            };
        }

        function updatePointerStatusText() {
            var pointerInfo = document.getElementById('pointerInfo');
            if (!pointerInfo) return;

            pointerInfo.textContent = isPointerLocked ? '鼠标已锁定，保持压制' : '左键锁定鼠标进入战斗';
        }

        function updateAudioStatusText() {
            var audioInfo = document.getElementById('audioInfo');
            if (!audioInfo) return;

            if (!window.AudioContext && !window.webkitAudioContext) {
                audioInfo.textContent = '浏览器不支持';
                return;
            }

            if (!audioContext) {
                audioInfo.textContent = '点击开始激活';
                return;
            }

            audioInfo.textContent = audioContext.state === 'running' ? '战场音效在线' : '等待恢复';
        }

        function ensureAudioContext() {
            var AudioContextCtor = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextCtor) return null;

            if (!audioContext) {
                audioContext = new AudioContextCtor();

                var compressor = audioContext.createDynamicsCompressor();
                compressor.threshold.value = -18;
                compressor.knee.value = 22;
                compressor.ratio.value = 5;
                compressor.attack.value = 0.003;
                compressor.release.value = 0.18;

                audioMasterGain = audioContext.createGain();
                audioMasterGain.gain.value = 0.24;
                audioMasterGain.connect(compressor);
                compressor.connect(audioContext.destination);
            }

            updateAudioStatusText();
            return audioContext;
        }

        function resumeAudioContext() {
            var ctx = ensureAudioContext();
            if (!ctx) return;

            if (ctx.state === 'suspended') {
                ctx.resume().then(function() {
                    updateAudioStatusText();
                }).catch(function(error) {
                    console.warn('音频上下文恢复失败:', error);
                });
            } else {
                updateAudioStatusText();
            }
        }

        function getNoiseBuffer() {
            if (!audioContext) return null;
            if (audioNoiseBuffer) return audioNoiseBuffer;

            var buffer = audioContext.createBuffer(1, audioContext.sampleRate, audioContext.sampleRate);
            var channelData = buffer.getChannelData(0);

            for (var i = 0; i < channelData.length; i++) {
                channelData[i] = (Math.random() * 2 - 1) * (1 - i / channelData.length * 0.18);
            }

            audioNoiseBuffer = buffer;
            return audioNoiseBuffer;
        }

        function clampPan(value) {
            return Math.max(-0.95, Math.min(0.95, value || 0));
        }

        function connectToAudioBus(inputNode, pan) {
            if (!audioMasterGain) return;

            if (audioContext.createStereoPanner) {
                var panner = audioContext.createStereoPanner();
                panner.pan.value = clampPan(pan);
                inputNode.connect(panner);
                panner.connect(audioMasterGain);
            } else {
                inputNode.connect(audioMasterGain);
            }
        }

        function scheduleEnvelope(gainNode, at, peak, attack, decay) {
            var safePeak = Math.max(peak, 0.0001);
            gainNode.gain.cancelScheduledValues(at);
            gainNode.gain.setValueAtTime(0.0001, at);
            gainNode.gain.linearRampToValueAtTime(safePeak, at + attack);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, at + attack + decay);
        }

        function playOscillatorBurst(options) {
            if (!audioContext || !audioMasterGain) return;

            var osc = audioContext.createOscillator();
            var gainNode = audioContext.createGain();
            var at = options.at || audioContext.currentTime;
            var attack = options.attack || 0.002;
            var decay = options.decay || 0.14;
            var endFrequency = options.endFrequency || Math.max(30, (options.startFrequency || 160) * 0.45);

            osc.type = options.type || 'triangle';
            osc.frequency.setValueAtTime(options.startFrequency || 160, at);
            osc.frequency.exponentialRampToValueAtTime(Math.max(endFrequency, 20), at + attack + decay);
            scheduleEnvelope(gainNode, at, options.volume || 0.08, attack, decay);
            osc.connect(gainNode);
            connectToAudioBus(gainNode, options.pan || 0);
            osc.start(at);
            osc.stop(at + attack + decay + 0.05);
        }

        function playNoiseBurst(options) {
            if (!audioContext || !audioMasterGain) return;

            var buffer = getNoiseBuffer();
            if (!buffer) return;

            var source = audioContext.createBufferSource();
            var filter = audioContext.createBiquadFilter();
            var gainNode = audioContext.createGain();
            var at = options.at || audioContext.currentTime;
            var attack = options.attack || 0.002;
            var decay = options.decay || 0.08;

            source.buffer = buffer;
            filter.type = options.filterType || 'bandpass';
            filter.frequency.setValueAtTime(options.filterFrequency || 900, at);
            filter.Q.value = options.filterQ || 0.8;

            scheduleEnvelope(gainNode, at, options.volume || 0.03, attack, decay);
            source.connect(filter);
            filter.connect(gainNode);
            connectToAudioBus(gainNode, options.pan || 0);
            source.start(at);
            source.stop(at + attack + decay + 0.04);
        }

        function getRelativePan(sourcePosition) {
            if (!player || !sourcePosition) return 0;
            return clampPan((sourcePosition.x - player.position.x) / 70);
        }

        function getDistanceVolume(sourcePosition, maxDistance, minVolume, maxVolume) {
            if (!player || !sourcePosition) return maxVolume;

            var distance = player.position.distanceTo(sourcePosition);
            var ratio = Math.max(0, 1 - Math.min(distance / maxDistance, 1));
            return minVolume + (maxVolume - minVolume) * ratio;
        }

        function playFootstepSound() {
            resumeAudioContext();
            if (!audioContext || !audioMasterGain) return;

            var now = audioContext.currentTime;
            var pan = footstepIndex % 2 === 0 ? -0.12 : 0.12;
            var baseFrequency = footstepIndex % 2 === 0 ? 86 : 96;

            playOscillatorBurst({
                type: 'triangle',
                at: now,
                startFrequency: baseFrequency,
                endFrequency: 42,
                volume: 0.09,
                attack: 0.001,
                decay: 0.05,
                pan: pan
            });

            playNoiseBurst({
                at: now,
                filterType: 'bandpass',
                filterFrequency: footstepIndex % 2 === 0 ? 620 : 760,
                filterQ: 0.7,
                volume: 0.028,
                attack: 0.001,
                decay: 0.06,
                pan: pan
            });

            footstepIndex++;
        }

        function playReloadSound(weaponName) {
            resumeAudioContext();
            if (!audioContext || !audioMasterGain || !window.CrossfireAudio) return;

            var profile = window.CrossfireAudio.getWeaponAudioProfile(weaponName);
            var now = audioContext.currentTime;
            var durationSeconds = reloadDuration / 1000;

            for (var i = 0; i < profile.reloadPattern.length; i++) {
                var at = now + profile.reloadPattern[i] * durationSeconds;
                playOscillatorBurst({
                    type: i % 2 === 0 ? 'square' : 'triangle',
                    at: at,
                    startFrequency: 980 - i * 120,
                    endFrequency: 360,
                    volume: 0.035,
                    attack: 0.001,
                    decay: 0.045,
                    pan: 0.16
                });

                playNoiseBurst({
                    at: at,
                    filterType: 'bandpass',
                    filterFrequency: 1600 - i * 150,
                    filterQ: 3.2,
                    volume: 0.018,
                    attack: 0.001,
                    decay: 0.03,
                    pan: 0.16
                });
            }

            playOscillatorBurst({
                type: 'triangle',
                at: now + durationSeconds * 0.92,
                startFrequency: 320,
                endFrequency: 180,
                volume: 0.04,
                attack: 0.001,
                decay: 0.06,
                pan: 0.12
            });
        }

        function playWeaponShotSound(weaponName, options) {
            resumeAudioContext();
            if (!audioContext || !audioMasterGain || !window.CrossfireAudio) return;

            var profile = window.CrossfireAudio.getWeaponAudioProfile(weaponName);
            var shot = profile.shot;
            var now = audioContext.currentTime;
            var volumeScale = options && options.volumeScale ? options.volumeScale : 1;
            var pan = options && options.pan ? options.pan : 0;

            playOscillatorBurst({
                type: shot.wave,
                at: now,
                startFrequency: shot.startFrequency,
                endFrequency: shot.endFrequency,
                volume: 0.16 * volumeScale,
                attack: 0.001,
                decay: shot.decay,
                pan: pan
            });

            playNoiseBurst({
                at: now,
                filterType: 'highpass',
                filterFrequency: weaponName === 'shotgun' ? 540 : 880,
                filterQ: 0.9,
                volume: shot.noiseAmount * 0.16 * volumeScale,
                attack: 0.001,
                decay: shot.decay * 0.82,
                pan: pan
            });

            if (weaponName === 'shotgun' || weaponName === 'sniper') {
                playOscillatorBurst({
                    type: 'sine',
                    at: now + 0.02,
                    startFrequency: weaponName === 'shotgun' ? 72 : 58,
                    endFrequency: 30,
                    volume: 0.08 * volumeScale,
                    attack: 0.001,
                    decay: weaponName === 'shotgun' ? 0.18 : 0.26,
                    pan: pan
                });
            }
        }

        function playHitConfirmSound(isKill) {
            resumeAudioContext();
            if (!audioContext || !audioMasterGain) return;

            var nowMs = Date.now();
            if (!isKill && nowMs - lastHitConfirmTime < 70) return;
            lastHitConfirmTime = nowMs;

            var now = audioContext.currentTime;
            playOscillatorBurst({
                type: 'sine',
                at: now,
                startFrequency: isKill ? 960 : 720,
                endFrequency: isKill ? 560 : 480,
                volume: isKill ? 0.075 : 0.05,
                attack: 0.001,
                decay: isKill ? 0.09 : 0.06
            });

            if (isKill) {
                playOscillatorBurst({
                    type: 'triangle',
                    at: now + 0.05,
                    startFrequency: 540,
                    endFrequency: 320,
                    volume: 0.05,
                    attack: 0.001,
                    decay: 0.08
                });
            }
        }

        function triggerPlayerDamageSound(intensity) {
            resumeAudioContext();
            if (!audioContext || !audioMasterGain) return;

            var nowMs = Date.now();
            if (nowMs - lastPlayerDamageSoundTime < 140) return;
            lastPlayerDamageSoundTime = nowMs;

            var now = audioContext.currentTime;
            var heavy = intensity >= 25;

            playOscillatorBurst({
                type: heavy ? 'sawtooth' : 'triangle',
                at: now,
                startFrequency: heavy ? 140 : 118,
                endFrequency: 54,
                volume: heavy ? 0.12 : 0.09,
                attack: 0.001,
                decay: heavy ? 0.16 : 0.12
            });

            playNoiseBurst({
                at: now,
                filterType: 'lowpass',
                filterFrequency: heavy ? 420 : 520,
                filterQ: 0.8,
                volume: heavy ? 0.05 : 0.035,
                attack: 0.001,
                decay: 0.08
            });
        }

        function playEmptyTriggerSound() {
            resumeAudioContext();
            if (!audioContext || !audioMasterGain) return;

            var now = audioContext.currentTime;
            playOscillatorBurst({
                type: 'square',
                at: now,
                startFrequency: 420,
                endFrequency: 260,
                volume: 0.03,
                attack: 0.001,
                decay: 0.035,
                pan: 0.12
            });
        }

        function drawMinimapGrid(ctx, size) {
            var center = size / 2;
            var radius = center - radarConfig.padding;
            var gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, 'rgba(14, 32, 42, 0.95)');
            gradient.addColorStop(1, 'rgba(40, 62, 66, 0.85)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);

            ctx.save();
            ctx.beginPath();
            ctx.arc(center, center, radius, 0, Math.PI * 2);
            ctx.clip();

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
            ctx.lineWidth = 1;

            for (var i = 1; i <= 3; i++) {
                ctx.beginPath();
                ctx.arc(center, center, radius * (i / 3), 0, Math.PI * 2);
                ctx.stroke();
            }

            for (var j = 0; j < 4; j++) {
                var angle = (Math.PI / 2) * j;
                ctx.beginPath();
                ctx.moveTo(center, center);
                ctx.lineTo(center + Math.cos(angle) * radius, center + Math.sin(angle) * radius);
                ctx.stroke();
            }

            ctx.restore();

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.16)';
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.arc(center, center, radius, 0, Math.PI * 2);
            ctx.stroke();

            ctx.fillStyle = 'rgba(241, 233, 213, 0.5)';
            ctx.font = '700 11px Rajdhani, Noto Sans SC, sans-serif';
            ctx.fillText('FWD', center - 12, radarConfig.padding - 4);
            ctx.fillText(String(radarConfig.range) + 'm', center - 12, size - 6);
        }

        function getRadarPointForPosition(position) {
            if (!window.CrossfireRadar) return null;

            if (player) {
                return window.CrossfireRadar.projectWorldToRadarPoint(
                    { x: position.x, z: position.z },
                    { x: player.position.x, z: player.position.z },
                    {
                        size: radarConfig.size,
                        padding: radarConfig.padding,
                        range: radarConfig.range,
                        yaw: player.yaw || 0
                    }
                );
            }

            return window.CrossfireRadar.worldToMinimapPoint({
                x: position.x,
                z: position.z
            }, radarConfig);
        }

        function drawMinimapAnchors(ctx) {
            if (!player || !window.CrossfireRadar) return;

            ctx.fillStyle = 'rgba(223, 232, 214, 0.52)';
            ctx.font = '700 10px Rajdhani, Noto Sans SC, sans-serif';

            for (var i = 0; i < radarConfig.anchors.length; i++) {
                var anchor = radarConfig.anchors[i];
                var point = getRadarPointForPosition(anchor);
                if (!point) continue;

                ctx.beginPath();
                ctx.fillStyle = 'rgba(255, 226, 171, 0.16)';
                ctx.arc(point.x, point.y, 5, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'rgba(223, 232, 214, 0.6)';
                ctx.fillText(anchor.label, point.x + 6, point.y - 6);
            }
        }

        function drawMinimapMarker(ctx, point, color, radius, glowRadius) {
            ctx.beginPath();
            ctx.fillStyle = glowRadius ? 'rgba(255, 255, 255, 0.04)' : color;
            if (glowRadius) {
                ctx.arc(point.x, point.y, glowRadius, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.beginPath();
            ctx.fillStyle = color;
            ctx.arc(point.x, point.y, radius, 0, Math.PI * 2);
            ctx.fill();
        }

        function updateMinimap() {
            if (!minimapContext || !minimapCanvas || !window.CrossfireRadar) return;

            var ctx = minimapContext;
            var size = minimapCanvas.width;
            ctx.clearRect(0, 0, size, size);
            drawMinimapGrid(ctx, size);
            drawMinimapAnchors(ctx);

            for (var i = 0; i < teammates.length; i++) {
                if (!teammates[i].isAlive) continue;
                var teammatePoint = getRadarPointForPosition(teammates[i].position);
                drawMinimapMarker(ctx, teammatePoint, '#59c6ff', 4, 8);
            }

            for (var j = 0; j < enemies.length; j++) {
                if (!enemies[j].isAlive) continue;
                var enemyPoint = getRadarPointForPosition(enemies[j].position);
                drawMinimapMarker(ctx, enemyPoint, '#ff6a5c', 4, 8);
            }

            if (player && playerHealth > 0) {
                var playerPoint = {
                    x: size / 2,
                    y: size / 2
                };
                drawMinimapMarker(ctx, playerPoint, '#8eff9a', 5, 10);

                ctx.beginPath();
                ctx.strokeStyle = '#dfffe6';
                ctx.lineWidth = 2;
                ctx.moveTo(playerPoint.x, playerPoint.y);
                ctx.lineTo(playerPoint.x, playerPoint.y - 16);
                ctx.stroke();

                ctx.beginPath();
                ctx.fillStyle = '#dfffe6';
                ctx.moveTo(playerPoint.x, playerPoint.y - 20);
                ctx.lineTo(playerPoint.x - 5, playerPoint.y - 10);
                ctx.lineTo(playerPoint.x + 5, playerPoint.y - 10);
                ctx.closePath();
                ctx.fill();
            }
        }

        function loadThreeJS() {
            console.log('=== 加载Three.js ===');
            
            if (window.THREE) {
                console.log('=== Three.js已存在，直接初始化 ===');
                document.getElementById('loading').style.display = 'none';
                initGame();
                return;
            }
            
            var script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
            script.onload = function() {
                console.log('=== Three.js加载成功 ===');
                document.getElementById('loading').style.display = 'none';
                initGame();
            };
            script.onerror = function() {
                console.error('=== Three.js加载失败 ===');
                document.getElementById('loading').style.display = 'none';
                alert('Three.js加载失败，请检查网络连接！');
            };
            document.head.appendChild(script);
        }

        function initGame() {
            console.log('=== 初始化游戏 ===');
            
            try {
                if (scene && camera && renderer) {
                    console.log('=== 场景已存在，重新开始游戏 ===');
                    restartGame();
                    return;
                }
                
                if (!window.THREE) {
                    console.error('Three.js未加载！');
                    alert('Three.js未加载，请刷新页面重试！');
                    return;
                }
                
                scene = new THREE.Scene();
                console.log('场景创建成功');
                scene.background = new THREE.Color(0x89adcb);
                scene.fog = new THREE.Fog(0xd3b486, 120, 360);

                // 创建相机
                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(0, 1.7, 0);
                scene.add(camera);
                console.log('相机创建成功');

                // 创建渲染器
                var canvas = document.getElementById('gameCanvas');
                console.log('Canvas元素:', canvas);
                
                renderer = new THREE.WebGLRenderer({
                    canvas: canvas,
                    antialias: true
                });
                renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.75));
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                renderer.outputEncoding = THREE.sRGBEncoding;
                renderer.toneMapping = THREE.ACESFilmicToneMapping;
                renderer.toneMappingExposure = 1.08;
                console.log('渲染器创建成功');

                // 添加灯光
                var hemisphereLight = new THREE.HemisphereLight(0xc7e1ff, 0xc89d62, 1.25);
                scene.add(hemisphereLight);
                console.log('半球光添加成功');

                var ambientLight = new THREE.AmbientLight(0xf4d7b2, 0.35);
                scene.add(ambientLight);
                console.log('环境光添加成功');

                var directionalLight = new THREE.DirectionalLight(0xfff1d0, 1.55);
                directionalLight.position.set(-120, 180, -40);
                directionalLight.castShadow = true;
                directionalLight.shadow.mapSize.width = 2048;
                directionalLight.shadow.mapSize.height = 2048;
                directionalLight.shadow.camera.left = -260;
                directionalLight.shadow.camera.right = 260;
                directionalLight.shadow.camera.top = 260;
                directionalLight.shadow.camera.bottom = -260;
                directionalLight.shadow.camera.near = 0.5;
                directionalLight.shadow.camera.far = 500;
                scene.add(directionalLight);
                console.log('方向光添加成功');

                var rimLight = new THREE.DirectionalLight(0x8eb9ff, 0.4);
                rimLight.position.set(140, 80, 120);
                scene.add(rimLight);

                createSceneAtmosphere();

                // 创建地图
                createDust2Map();

                // 创建玩家
                createPlayer();

                // 设置事件监听器
                setupGameEvents();

                // 窗口大小调整
                window.addEventListener('resize', onWindowResize);

                isGameRunning = true;
                setHudVisibility(true);
                playerHealth = 100;
                lastFootstepTime = 0;
                footstepIndex = 0;
                lastPlayerDamageSoundTime = 0;
                lastHitConfirmTime = 0;
                currentWeapon = Object.assign({}, weapons[selectedWeapon]);
                createTeammates(teammateCount);
                createEnemies(enemyCount);
                updateHUD();
                updateMinimap();
                
                console.log('=== 游戏初始化完成，开始游戏循环 ===');
                
                // 立即渲染一帧
                renderer.render(scene, camera);
                console.log('第一帧渲染完成');
                
                // 开始游戏循环
                gameLoop();
            } catch (error) {
                console.error('初始化游戏时出错:', error);
                alert('初始化游戏时出错: ' + error.message);
            }
        }

        function createSandTexture(baseColor, accentColor) {
            var canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;

            var context = canvas.getContext('2d');
            context.fillStyle = baseColor;
            context.fillRect(0, 0, canvas.width, canvas.height);

            for (var i = 0; i < 1800; i++) {
                var alpha = 0.06 + Math.random() * 0.08;
                var size = 1 + Math.random() * 3;
                context.fillStyle = accentColor.replace('ALPHA', alpha.toFixed(3));
                context.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, size, size);
            }

            for (var j = 0; j < 42; j++) {
                context.strokeStyle = accentColor.replace('ALPHA', (0.03 + Math.random() * 0.05).toFixed(3));
                context.lineWidth = 1 + Math.random() * 2;
                context.beginPath();
                var startX = Math.random() * canvas.width;
                var startY = Math.random() * canvas.height;
                context.moveTo(startX, startY);
                context.quadraticCurveTo(
                    startX + 20 + Math.random() * 50,
                    startY - 6 + Math.random() * 12,
                    startX + 60 + Math.random() * 80,
                    startY + 8 + Math.random() * 20
                );
                context.stroke();
            }

            var texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.anisotropy = 4;
            return texture;
        }

        function createBuilding(x, y, z, width, height, depth, wallMat, darkMat) {
            var group = new THREE.Group();
            
            var mainWall = new THREE.Mesh(
                new THREE.BoxGeometry(width, height, depth),
                wallMat
            );
            mainWall.position.y = height / 2;
            mainWall.castShadow = true;
            mainWall.receiveShadow = true;
            group.add(mainWall);
            
            if (darkMat) {
                var topWall = new THREE.Mesh(
                    new THREE.BoxGeometry(width + 1, 2, depth + 1),
                    darkMat
                );
                topWall.position.y = height + 1;
                topWall.castShadow = true;
                group.add(topWall);
            }
            
            var trimMat = createWallMaterial(0x654321);
            var bottomTrim = new THREE.Mesh(
                new THREE.BoxGeometry(width + 0.5, 0.5, depth + 0.5),
                trimMat
            );
            bottomTrim.position.y = 0.25;
            group.add(bottomTrim);
            
            if (width > 15 && height > 5) {
                var windowMat = new THREE.MeshStandardMaterial({
                    color: 0x1a1a2e,
                    roughness: 0.1,
                    metalness: 0.8
                });
                
                for (var wx = -width/2 + 5; wx < width/2 - 3; wx += 8) {
                    for (var wy = 3; wy < height - 2; wy += 5) {
                        var win = new THREE.Mesh(
                            new THREE.BoxGeometry(3, 3, 0.3),
                            windowMat
                        );
                        win.position.set(wx, wy, depth/2 + 0.15);
                        group.add(win);
                        
                        var winBack = win.clone();
                        winBack.position.z = -depth/2 - 0.15;
                        group.add(winBack);
                    }
                }
            }
            
            group.position.set(x, y, z);
            scene.add(group);
        }

        function setupGameEvents() {
            document.addEventListener('keydown', function(e) {
                keysPressed[e.code] = true;

                if (isGameRunning) {
                    if ((!e.repeat) && window.CrossfireHud && window.CrossfireHud.isHudToggleKey(e.code)) {
                        toggleHudVisibility();
                        return;
                    }
                    resumeAudioContext();
                    if (e.code === 'Space' && !player.isJumping) {
                        player.velocity.y = player.jumpForce;
                        player.isJumping = true;
                    }
                    if (e.code === 'KeyR') reload();
                }
            });

            document.addEventListener('keyup', function(e) {
                keysPressed[e.code] = false;
            });

            document.addEventListener('mousemove', function(e) {
                if (!isGameRunning || !isPointerLocked) return;
                var sensitivity = 0.002;
                
                player.yaw -= e.movementX * sensitivity;
                player.pitch -= e.movementY * sensitivity;
                player.pitch = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, player.pitch));
                
                camera.rotation.order = 'YXZ';
                camera.rotation.y = player.yaw;
                camera.rotation.x = player.pitch;
                camera.rotation.z = 0;
            });

            document.addEventListener('mousedown', function(e) {
                if (!isGameRunning) return;
                resumeAudioContext();
                if (e.button === 0) {
                    if (!isPointerLocked) {
                        document.body.requestPointerLock();
                    } else {
                        player.shooting = true;
                    }
                }
            });

            document.addEventListener('mouseup', function(e) {
                if (!isGameRunning) return;
                if (e.button === 0) {
                    player.shooting = false;
                }
            });

            document.addEventListener('pointerlockchange', function() {
                isPointerLocked = document.pointerLockElement === document.body;
                if (isPointerLocked) {
                    resumeAudioContext();
                }
                updatePointerStatusText();
            });
            console.log('游戏事件监听器设置成功');
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function createTeammates(count) {
            teammates = [];
            for (var i = 0; i < count; i++) {
                var teammate = createCharacter(0x4169E1, 'teammate');
                var angle = (i / count) * Math.PI * 2;
                var radius = 10 + Math.random() * 8;
                teammate.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
                teammate.health = 100;
                teammate.isAlive = true;
                teammate.lastShot = 0;
                teammates.push(teammate);
                scene.add(teammate);
            }

                var angle = (i / count) * Math.PI * 2 + Math.PI;

                enemy.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
                enemy.health = 100;
                enemy.isAlive = true;
