        function restartGame() {
            console.log('=== 重新开始游戏 ===');
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('menu').style.display = 'none';
            
            for (var i = 0; i < teammates.length; i++) {
                if (teammates[i]) scene.remove(teammates[i]);
            }
            for (var i = 0; i < enemies.length; i++) {
                if (enemies[i]) scene.remove(enemies[i]);
            }
            for (var i = 0; i < bullets.length; i++) {
                if (bullets[i]) scene.remove(bullets[i]);
            }
            teammates = [];
            enemies = [];
            bullets = [];
            
            if (player) {
                player.position.set(0, 0, 0);
                player.yaw = 0;
                player.pitch = 0;
                if (player.velocity) {
                    player.velocity.set(0, 0, 0);
                } else {
                    player.velocity = new THREE.Vector3(0, 0, 0);
                }
            }
            
            if (camera) {
                camera.rotation.set(0, 0, 0);
            }
            
            playerHealth = 100;
            setHudVisibility(true);
            lastFootstepTime = 0;
            footstepIndex = 0;
            lastPlayerDamageSoundTime = 0;
            lastHitConfirmTime = 0;
            isGameRunning = true;
            currentWeapon = Object.assign({}, weapons[selectedWeapon]);
            createWeaponModel(selectedWeapon);
            createTeammates(teammateCount);
            createEnemies(enemyCount);
            updateHUD();
            updateMinimap();
            
            if (!renderer || !scene || !camera) {
                console.error('渲染器、场景或相机不存在！');
                return;
            }
            
            renderer.render(scene, camera);
            gameLoop();
        }

        function updateHUD() {
            var counts = getAliveCounts();
            var healthValue = Math.max(0, Math.floor(playerHealth));
            var weaponInfo = document.getElementById('weaponInfo');
            var ammoInfo = document.getElementById('ammoInfo');
            var healthInfo = document.getElementById('healthInfo');
            var healthBarFill = document.getElementById('healthBarFill');
            var teamInfo = document.getElementById('teamInfo');
            var objectiveInfo = document.getElementById('objectiveInfo');
            var statusInfo = document.getElementById('statusInfo');

            if (weaponInfo) {
                weaponInfo.textContent = currentWeapon.name;
            }

            if (ammoInfo) {
                ammoInfo.textContent = currentWeapon.ammo + ' / ' + currentWeapon.reserveAmmo;
            }

            if (healthInfo) {
                healthInfo.textContent = String(healthValue);
            }

            if (healthBarFill) {
                healthBarFill.style.width = Math.max(0, Math.min(100, healthValue)) + '%';
            }

            if (teamInfo) {
                teamInfo.textContent = '友军 ' + counts.aliveTeammates + ' / 敌军 ' + counts.aliveEnemies;
            }

            if (objectiveInfo) {
                objectiveInfo.textContent = counts.aliveEnemies > 0 ? '清除剩余 ' + counts.aliveEnemies + ' 名敌军' : '区域已清空';
            }

            if (statusInfo) {
                if (healthValue <= 35) {
                    statusInfo.textContent = '重伤';
                    statusInfo.dataset.state = 'danger';
                } else if (isPointerLocked && counts.aliveEnemies > 0) {
                    statusInfo.textContent = '交战中';
                    statusInfo.dataset.state = 'engaged';
                } else {
                    statusInfo.textContent = '待命';
                    statusInfo.dataset.state = 'ready';
                }
            }

            updatePointerStatusText();
            updateAudioStatusText();
        }

        function shoot() {
            if (!player.canShoot || player.isReloading) return;
            
            if (currentWeapon.ammo <= 0) {
                playEmptyTriggerSound();
                reload();
                return;
            }
            
            player.canShoot = false;
            currentWeapon.ammo--;
            playWeaponShotSound(selectedWeapon, {
                volumeScale: 1,
                pan: 0.08
            });

            weaponRecoil = 0.15;
            
            if (muzzleFlash) {
                muzzleFlash.visible = true;
                muzzleFlashTime = 50;
                
                for (var i = 0; i < muzzleFlash.children.length; i++) {
                    muzzleFlash.children[i].scale.set(
                        0.8 + Math.random() * 0.4,
                        0.8 + Math.random() * 0.4,
                        0.8 + Math.random() * 0.4
                    );
                }
            }

            var pellets = currentWeapon.pellets || 1;
            for (var i = 0; i < pellets; i++) {
                var spread = currentWeapon.spread;
                var direction = new THREE.Vector3(0, 0, -1);
                direction.x += (Math.random() - 0.5) * spread;
                direction.y += (Math.random() - 0.5) * spread;
                direction.z += (Math.random() - 0.5) * spread;
                direction.normalize();
                
                direction.applyAxisAngle(new THREE.Vector3(1, 0, 0), player.pitch);
                direction.applyAxisAngle(new THREE.Vector3(0, 1, 0), player.yaw);

                var bullet = createBullet(direction, currentWeapon.damage, 'player');
                bullet.position.copy(camera.position);
                bullets.push(bullet);
                scene.add(bullet);
            }

            setTimeout(function() { player.canShoot = true; }, currentWeapon.fireRate);
            updateHUD();
        }

        function createBullet(direction, damage, owner) {
            var geometry = new THREE.SphereGeometry(0.05, 8, 8);
            var material;
            if (owner === 'player' || owner === 'teammate') {
                material = new THREE.MeshBasicMaterial({ color: 0xFFFF00 });
            } else {
                material = new THREE.MeshBasicMaterial({ color: 0xFF0000 });
            }
            var bullet = new THREE.Mesh(geometry, material);
            bullet.position.copy(camera.position);
            bullet.direction = direction;
            bullet.damage = damage;
            bullet.speed = 100;
            bullet.lifetime = 2;
            bullet.owner = owner;
            return bullet;
        }

        function getHitPart(hitY, targetBaseY) {
            var relativeY = hitY - targetBaseY;
            
            if (relativeY > 1.4) {
                return { part: 'head', multiplier: 4.0, name: '爆头' };
            } else if (relativeY > 1.0) {
                return { part: 'chest', multiplier: 1.5, name: '胸部' };
            } else if (relativeY > 0.5) {
                return { part: 'stomach', multiplier: 1.2, name: '腹部' };
            } else if (relativeY > 0.2) {
                return { part: 'legs', multiplier: 0.8, name: '腿部' };
            } else {
                return { part: 'feet', multiplier: 0.6, name: '脚部' };
            }
        }

        function updateBullets(delta) {
            for (var i = bullets.length - 1; i >= 0; i--) {
                var bullet = bullets[i];
                bullet.position.add(bullet.direction.clone().multiplyScalar(bullet.speed * delta));
                bullet.lifetime -= delta;

                var hit = false;
                
                if (bullet.owner === 'player' || bullet.owner === 'teammate') {
                    for (var j = 0; j < enemies.length; j++) {
                        if (!enemies[j].isAlive) continue;
                        var enemyBaseY = enemies[j].position.y;
                        var enemyCenter = enemies[j].position.clone();
                        enemyCenter.y += 0.8;
                        var distance = bullet.position.distanceTo(enemyCenter);
                        if (distance < 1.2) {
                            var hitPart = getHitPart(bullet.position.y, enemyBaseY);
                            var actualDamage = bullet.damage * hitPart.multiplier;
                            enemies[j].health -= actualDamage;
                            hit = true;
                            if (bullet.owner === 'player') {
                                playHitConfirmSound(enemies[j].health <= 0);
                            }
                            console.log('击中敌人' + hitPart.name + '! 伤害:' + actualDamage.toFixed(1) + ' 敌人血量:', enemies[j].health.toFixed(1));
                            if (enemies[j].health <= 0) {
                                enemies[j].isAlive = false;
                                scene.remove(enemies[j]);
                                console.log('敌人被消灭!');
                            }
                            break;
                        }
                    }
                } else {
                    if (playerHealth > 0) {
                        var playerBaseY = player.position.y;
                        var playerCenter = player.position.clone();
                        playerCenter.y += 0.8;
                        var distanceToPlayer = bullet.position.distanceTo(playerCenter);
                        if (distanceToPlayer < 1.2) {
                            var hitPart = getHitPart(bullet.position.y, playerBaseY);
                            var actualDamage = bullet.damage * hitPart.multiplier;
                            playerHealth -= actualDamage;
                            hit = true;
                            triggerPlayerDamageSound(actualDamage);
                            console.log('玩家被击中' + hitPart.name + '! 伤害:' + actualDamage.toFixed(1) + ' 玩家血量:', playerHealth.toFixed(1));
                        }
                    }
                    
                    for (var j = 0; j < teammates.length; j++) {
                        if (!teammates[j].isAlive) continue;
                        var teammateBaseY = teammates[j].position.y;
                        var teammateCenter = teammates[j].position.clone();
                        teammateCenter.y += 0.8;
                        var distance = bullet.position.distanceTo(teammateCenter);
                        if (distance < 1.2) {
                            var hitPart = getHitPart(bullet.position.y, teammateBaseY);
                            var actualDamage = bullet.damage * hitPart.multiplier;
                            teammates[j].health -= actualDamage;
                            hit = true;
                            console.log('队友被击中' + hitPart.name + '! 伤害:' + actualDamage.toFixed(1) + ' 队友血量:', teammates[j].health.toFixed(1));
                            if (teammates[j].health <= 0) {
                                teammates[j].isAlive = false;
                                scene.remove(teammates[j]);
                                console.log('队友被消灭!');
                            }
                            break;
                        }
                    }
                }

                if (hit || bullet.lifetime <= 0) {
                    scene.remove(bullet);
                    bullets.splice(i, 1);
                }
            }
        }

        function updatePlayer(delta) {
            if (!player) return;
            
            var direction = new THREE.Vector3();
            if (keysPressed['KeyW']) direction.z -= 1;
            if (keysPressed['KeyS']) direction.z += 1;
            if (keysPressed['KeyA']) direction.x -= 1;
            if (keysPressed['KeyD']) direction.x += 1;
            var isMoving = direction.lengthSq() > 0;

            direction.normalize();
            direction.applyAxisAngle(new THREE.Vector3(0, 1, 0), player.yaw);

            if (!player.velocity) {
                player.velocity = new THREE.Vector3();
            }
            
            player.velocity.x = direction.x * player.speed;
            player.velocity.z = direction.z * player.speed;
            player.velocity.y -= 20 * delta;

            player.position.add(player.velocity.clone().multiplyScalar(delta));

            if (player.position.y < 0) {
                player.position.y = 0;
                player.velocity.y = 0;
                player.isJumping = false;
            }

            player.position.x = Math.max(-170, Math.min(170, player.position.x));
            player.position.z = Math.max(-170, Math.min(170, player.position.z));

            camera.position.copy(player.position);
            camera.position.y += 1.6;

            var now = Date.now();
            if (window.CrossfireAudio && window.CrossfireAudio.shouldTriggerFootstep({
                isMoving: isMoving,
                isGrounded: player.position.y <= 0.001 && !player.isJumping,
                isReloading: player.isReloading,
                now: now,
                lastStepTime: lastFootstepTime,
                stepInterval: selectedWeapon === 'sniper' ? 380 : 320
            })) {
                lastFootstepTime = now;
                playFootstepSound();
            }

            if (player.shooting) shoot();
        }

        function updateWeapon(delta) {
            if (!weaponModel) return;
            
            var baseX = 0.2;
            var baseY = -0.15;
            var baseZ = -0.35;
            
            var isMoving = keysPressed['KeyW'] || keysPressed['KeyS'] || keysPressed['KeyA'] || keysPressed['KeyD'];
            
            if (isMoving && !player.isJumping && !player.isReloading) {
                weaponBob += delta * 8;
                var bobX = Math.sin(weaponBob) * 0.008;
                var bobY = Math.abs(Math.cos(weaponBob)) * 0.005;
                baseX += bobX;
                baseY += bobY;
            }
            
            weaponRecoil *= 0.85;
            var recoilZ = weaponRecoil * 0.5;
            var recoilX = weaponRecoil * 0.3;
            var recoilRotX = -weaponRecoil * 1.5;
            
            if (player.isReloading) {
                var now = Date.now();
                var elapsed = now - reloadStartTime;
                var progress = Math.min(elapsed / reloadDuration, 1);
                
                var reloadX = baseX;
                var reloadY = baseY;
                var reloadZ = baseZ;
                var rotX = recoilRotX;
                var rotY = Math.PI;
                var rotZ = 0;
                
                if (selectedWeapon === 'pistol') {
                    if (progress < 0.2) {
                        var p = progress / 0.2;
                        reloadY = baseY - p * 0.08;
                        rotX = recoilRotX - p * 0.4;
                        rotZ = p * 0.15;
                    } else if (progress < 0.35) {
                        var p = (progress - 0.2) / 0.15;
                        reloadY = baseY - 0.08;
                        rotX = recoilRotX - 0.4;
                        rotZ = 0.15 + p * 0.3;
                    } else if (progress < 0.5) {
                        var p = (progress - 0.35) / 0.15;
                        reloadY = baseY - 0.08 + p * 0.08;
                        rotX = recoilRotX - 0.4 + p * 0.4;
                        rotZ = 0.45 - p * 0.45;
                    } else if (progress < 0.7) {
                        var p = (progress - 0.5) / 0.2;
                        reloadY = baseY - p * 0.1;
                        rotX = recoilRotX - p * 0.3;
                    } else if (progress < 0.85) {
                        var p = (progress - 0.7) / 0.15;
                        reloadY = baseY - 0.1 + p * 0.1;
                        rotX = recoilRotX - 0.3 + p * 0.3;
                    } else {
                        var p = (progress - 0.85) / 0.15;
                        reloadY = baseY - p * 0.03;
                        rotX = recoilRotX - p * 0.1;
                    }
                    
                } else if (selectedWeapon === 'rifle') {
                    if (progress < 0.15) {
                        var p = progress / 0.15;
                        reloadY = baseY - p * 0.05;
                        rotX = recoilRotX - p * 0.2;
                    } else if (progress < 0.3) {
                        var p = (progress - 0.15) / 0.15;
                        reloadY = baseY - 0.05 - p * 0.12;
                        rotX = recoilRotX - 0.2 - p * 0.5;
                        rotZ = p * 0.4;
                    } else if (progress < 0.45) {
                        var p = (progress - 0.3) / 0.15;
                        reloadY = baseY - 0.17;
                        rotX = recoilRotX - 0.7;
                        rotZ = 0.4;
                        reloadX = baseX - p * 0.08;
                    } else if (progress < 0.6) {
                        var p = (progress - 0.45) / 0.15;
                        reloadY = baseY - 0.17 + p * 0.05;
                        rotX = recoilRotX - 0.7 + p * 0.2;
                        rotZ = 0.4 - p * 0.2;
                        reloadX = baseX - 0.08 + p * 0.08;
                    } else if (progress < 0.75) {
                        var p = (progress - 0.6) / 0.15;
                        reloadY = baseY - 0.12 + p * 0.12;
                        rotX = recoilRotX - 0.5 + p * 0.5;
                        rotZ = 0.2 - p * 0.2;
                    } else if (progress < 0.9) {
                        var p = (progress - 0.75) / 0.15;
                        reloadY = baseY - p * 0.08;
                        rotX = recoilRotX - p * 0.4;
                        rotZ = p * 0.3;
                    } else {
                        var p = (progress - 0.9) / 0.1;
                        reloadY = baseY - 0.08 + p * 0.08;
                        rotX = recoilRotX - 0.4 + p * 0.4;
                        rotZ = 0.3 - p * 0.3;
                    }
                    
                } else if (selectedWeapon === 'shotgun') {
                    if (progress < 0.15) {
                        var p = progress / 0.15;
                        reloadY = baseY - p * 0.06;
                        rotX = recoilRotX - p * 0.25;
                    } else if (progress < 0.3) {
                        var p = (progress - 0.15) / 0.15;
                        reloadY = baseY - 0.06;
                        rotX = recoilRotX - 0.25;
                        reloadZ = baseZ + p * 0.08;
                    } else if (progress < 0.5) {
                        var p = (progress - 0.3) / 0.2;
                        reloadY = baseY - 0.06 - p * 0.1;
                        rotX = recoilRotX - 0.25 - p * 0.4;
                        rotZ = p * 0.5;
                        reloadZ = baseZ + 0.08 - p * 0.08;
                    } else if (progress < 0.65) {
                        var p = (progress - 0.5) / 0.15;
                        reloadY = baseY - 0.16 + p * 0.06;
                        rotX = recoilRotX - 0.65 + p * 0.2;
                        rotZ = 0.5 - p * 0.2;
                    } else if (progress < 0.8) {
                        var p = (progress - 0.65) / 0.15;
                        reloadY = baseY - 0.1 + p * 0.1;
                        rotX = recoilRotX - 0.45 + p * 0.45;
                        rotZ = 0.3 - p * 0.3;
                    } else {
                        var p = (progress - 0.8) / 0.2;
                        reloadY = baseY - p * 0.04;
                        rotX = recoilRotX - p * 0.15;
                    }
                    
                } else if (selectedWeapon === 'sniper') {
                    if (progress < 0.12) {
                        var p = progress / 0.12;
                        reloadY = baseY - p * 0.04;
                        rotX = recoilRotX - p * 0.15;
                    } else if (progress < 0.28) {
                        var p = (progress - 0.12) / 0.16;
                        reloadY = baseY - 0.04 - p * 0.1;
                        rotX = recoilRotX - 0.15 - p * 0.4;
                        rotZ = p * 0.35;
                    } else if (progress < 0.42) {
                        var p = (progress - 0.28) / 0.14;
                        reloadY = baseY - 0.14;
                        rotX = recoilRotX - 0.55;
                        rotZ = 0.35;
                        reloadX = baseX - p * 0.06;
                    } else if (progress < 0.58) {
                        var p = (progress - 0.42) / 0.16;
                        reloadY = baseY - 0.14 + p * 0.04;
                        rotX = recoilRotX - 0.55 + p * 0.15;
                        rotZ = 0.35 - p * 0.1;
                        reloadX = baseX - 0.06 + p * 0.06;
                    } else if (progress < 0.75) {
                        var p = (progress - 0.58) / 0.17;
                        reloadY = baseY - 0.1 + p * 0.1;
                        rotX = recoilRotX - 0.4 + p * 0.4;
                        rotZ = 0.25 - p * 0.25;
                    } else if (progress < 0.88) {
                        var p = (progress - 0.75) / 0.13;
                        reloadY = baseY - p * 0.06;
                        rotX = recoilRotX - p * 0.25;
                        rotZ = p * 0.2;
                    } else {
                        var p = (progress - 0.88) / 0.12;
                        reloadY = baseY - 0.06 + p * 0.06;
                        rotX = recoilRotX - 0.25 + p * 0.25;
                        rotZ = 0.2 - p * 0.2;
                    }
                }
                
                weaponModel.position.set(
                    reloadX + recoilX,
                    reloadY,
                    reloadZ + recoilZ
                );
                weaponModel.rotation.set(rotX, rotY, rotZ);
            } else {
                weaponModel.position.set(
                    baseX,
                    baseY,
                    baseZ + recoilZ
                );
                weaponModel.rotation.set(recoilRotX, Math.PI, 0);
            }
            
            if (muzzleFlash && muzzleFlashTime > 0) {
                muzzleFlashTime -= delta * 1000;
                if (muzzleFlashTime <= 0) {
                    muzzleFlash.visible = false;
                }
            }
        }

        function updateTeammates(delta) {
            for (var i = 0; i < teammates.length; i++) {
                var teammate = teammates[i];
                if (!teammate.isAlive) continue;

                var nearestEnemy = null;
                var nearestDistance = Infinity;

                for (var j = 0; j < enemies.length; j++) {
                    if (!enemies[j].isAlive) continue;
                    var distance = teammate.position.distanceTo(enemies[j].position);
                    if (distance < nearestDistance) {
                        nearestDistance = distance;
                        nearestEnemy = enemies[j];
                    }
                }

                if (nearestEnemy) {
                    var targetPos = nearestEnemy.position.clone();
                    targetPos.y += 0.8;
                    var teammatePos = teammate.position.clone();
                    teammatePos.y += 0.8;
                    
                    var direction = new THREE.Vector3()
                        .subVectors(targetPos, teammatePos)
                        .normalize();
                    
                    if (nearestDistance > 12) {
                        teammate.position.add(direction.clone().multiplyScalar(2 * delta));
                    }

                    var now = Date.now();
                    if (now - teammate.lastShot > 1200 && nearestDistance < 25) {
                        teammate.lastShot = now;
                        
                        var spread = 0.15;
                        direction.x += (Math.random() - 0.5) * spread;
                        direction.y += (Math.random() - 0.5) * spread;
                        direction.z += (Math.random() - 0.5) * spread;
                        direction.normalize();
                        
                        var bullet = createBullet(direction, 10, 'teammate');
                        bullet.position.copy(teammatePos);
                        bullets.push(bullet);
                        scene.add(bullet);
                        playWeaponShotSound('rifle', {
                            volumeScale: getDistanceVolume(teammate.position, 140, 0.05, 0.08),
                            pan: getRelativePan(teammate.position)
                        });
                    }
                }
            }
        }

        function updateEnemies(delta) {
            for (var i = 0; i < enemies.length; i++) {
                var enemy = enemies[i];
                if (!enemy.isAlive) continue;

                var nearestTarget = null;
                var nearestDistance = Infinity;

                var targets = [player];
                for (var j = 0; j < teammates.length; j++) {
                    if (teammates[j].isAlive) {
                        targets.push(teammates[j]);
                    }
                }

                for (var j = 0; j < targets.length; j++) {
                    var distance = enemy.position.distanceTo(targets[j].position);
                    if (distance < nearestDistance) {
                        nearestDistance = distance;
                        nearestTarget = targets[j];
                    }
                }

                if (nearestTarget) {
                    var targetPos = nearestTarget.position.clone();
                    targetPos.y += 0.8;
                    var enemyPos = enemy.position.clone();
                    enemyPos.y += 0.8;
                    
                    var direction = new THREE.Vector3()
                        .subVectors(targetPos, enemyPos)
                        .normalize();
                    
                    if (nearestDistance > 18) {
                        enemy.position.add(direction.clone().multiplyScalar(1.5 * delta));
                    }

                    var now = Date.now();
                    if (now - enemy.lastShot > 1500 && nearestDistance < 30) {
                        enemy.lastShot = now;
                        
                        var spread = 0.2;
                        direction.x += (Math.random() - 0.5) * spread;
                        direction.y += (Math.random() - 0.5) * spread;
                        direction.z += (Math.random() - 0.5) * spread;
                        direction.normalize();
                        
                        var bullet = createBullet(direction, 8, 'enemy');
                        bullet.position.copy(enemyPos);
                        bullets.push(bullet);
                        scene.add(bullet);
                        playWeaponShotSound('rifle', {
                            volumeScale: getDistanceVolume(enemy.position, 140, 0.05, 0.1),
                            pan: getRelativePan(enemy.position)
                        });
                    }

                    if (nearestDistance < 2) {
                        playerHealth -= 5 * delta;
                        triggerPlayerDamageSound(8);
                    }
                }
            }
        }

        function checkGameOver() {
            var aliveTeammates = 0;
            for (var i = 0; i < teammates.length; i++) {
                if (teammates[i].isAlive) aliveTeammates++;
            }
            
            var aliveEnemies = 0;
            for (var i = 0; i < enemies.length; i++) {
                if (enemies[i].isAlive) aliveEnemies++;
            }

            if (playerHealth <= 0) {
                console.log('玩家死亡! 游戏失败!');
                endGame(false);
            } else if (aliveEnemies === 0 && enemies.length > 0) {
                console.log('所有敌人被消灭! 游戏胜利!');
                endGame(true);
            }
        }

        function endGame(victory) {
            isGameRunning = false;
            document.exitPointerLock();

            var gameOverDiv = document.getElementById('gameOver');
            var gameOverText = document.getElementById('gameOverText');
            var gameOverStats = document.getElementById('gameOverStats');

            gameOverDiv.className = victory ? 'victory' : 'defeat';
            gameOverText.textContent = victory ? '游戏胜利!' : '游戏失败!';

            var aliveTeammates = 0;
            for (var i = 0; i < teammates.length; i++) {
                if (teammates[i].isAlive) aliveTeammates++;
            }
            
            var killedEnemies = enemyCount;
            for (var i = 0; i < enemies.length; i++) {
                if (enemies[i].isAlive) killedEnemies--;
            }
            
            gameOverStats.textContent = '剩余队友: ' + aliveTeammates + ' | 击杀敌人: ' + killedEnemies;

            gameOverDiv.style.display = 'flex';
        }

        function gameLoop() {
            if (!isGameRunning) {
                console.log('游戏未运行，停止循环');
                return;
            }

            try {
                var delta = 0.016;
                updatePlayer(delta);
                updateWeapon(delta);
                updateTeammates(delta);
                updateEnemies(delta);
                updateBullets(delta);
                checkGameOver();
                updateHUD();
                updateMinimap();

                if (renderer && scene && camera) {
                    renderer.render(scene, camera);
                } else {
                    console.error('渲染器、场景或相机丢失！');
                    return;
                }
                requestAnimationFrame(gameLoop);
            } catch (error) {
                console.error('游戏循环出错:', error);
            }
        }

        function switchWeapon(weaponName) {
            if (player.isReloading) return;
            currentWeapon = Object.assign({}, weapons[weaponName]);
            createWeaponModel(weaponName);
            updateHUD();
        }

        function reload() {
            if (player.isReloading || currentWeapon.ammo === currentWeapon.maxAmmo) return;
            if (currentWeapon.reserveAmmo <= 0) return;

            player.isReloading = true;
            reloadStartTime = Date.now();
            
            if (selectedWeapon === 'pistol') {
                reloadDuration = 1800;
            } else if (selectedWeapon === 'rifle') {
                reloadDuration = 2500;
            } else if (selectedWeapon === 'shotgun') {
                reloadDuration = 3000;
            } else if (selectedWeapon === 'sniper') {
                reloadDuration = 2800;
            }

            playReloadSound(selectedWeapon);
            
            setTimeout(function() {
                var needed = currentWeapon.maxAmmo - currentWeapon.ammo;
                var available = Math.min(needed, currentWeapon.reserveAmmo);
                currentWeapon.ammo += available;
                currentWeapon.reserveAmmo -= available;
                player.isReloading = false;
                updateHUD();
            }, reloadDuration);
        }

        console.log('=== 脚本加载完成 ===');
    </script>
</body>
</html>
